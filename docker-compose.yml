services:
  # -----------------------------------------------------------------
  #  Service 1 : MongoDB — Base de donnees
  # -----------------------------------------------------------------
  mongodb:
    image: mongo:8
    container_name: thumalien_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - ./data/db:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_USER}", "-p", "${MONGO_PASSWORD}",
             "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - thumalien_network

  # -----------------------------------------------------------------
  #  Service 2 : Collecteur Bluesky + inference IA automatique
  # -----------------------------------------------------------------
  collector:
    build: .
    container_name: thumalien_collector
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app/src:/app
      MONGO_HOST: mongodb
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      BLUESKY_HANDLE: ${BLUESKY_HANDLE}
      BLUESKY_PASSWORD: ${BLUESKY_PASSWORD}
    volumes:
      - .:/app
    networks:
      - thumalien_network

  # -----------------------------------------------------------------
  #  Service 3 : Jupyter Lab — Environnement ML
  # -----------------------------------------------------------------
  notebook:
    build: .
    container_name: thumalien_notebook
    restart: unless-stopped
    command: jupyter lab --ip=0.0.0.0 --allow-root --NotebookApp.token='${JUPYTER_TOKEN}'
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/src:/app
      MONGO_HOST: mongodb
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8888:8888"
    networks:
      - thumalien_network

  # -----------------------------------------------------------------
  #  Service 4 : Dashboard Streamlit
  # -----------------------------------------------------------------
  dashboard:
    build: .
    container_name: thumalien_dashboard
    restart: unless-stopped
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/src:/app
      MONGO_HOST: mongodb
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8501:8501"
    networks:
      - thumalien_network

  # -----------------------------------------------------------------
  #  Service 5 : Backup MongoDB — Sauvegarde quotidienne automatisee
  # -----------------------------------------------------------------
  backup:
    image: mongo:8
    container_name: thumalien_backup
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_HOST: mongodb
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: thumalien_db
      BACKUP_DIR: /backups
      BACKUP_RETENTION: "7"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Backup scheduler started. Running daily at 02:00."
        while true; do
          /scripts/backup_mongodb.sh
          sleep 86400
        done
    volumes:
      - ./scripts:/scripts:ro
      - ./backups:/backups
    networks:
      - thumalien_network

# -----------------------------------------------------------------
#  API FastAPI (lancement manuel) :
#    docker compose run --rm -p 8000:8000 collector \
#      uvicorn src.api.main:app --host 0.0.0.0 --port 8000
# -----------------------------------------------------------------

# -----------------------------------------------------------------
#  Reseau interne
# -----------------------------------------------------------------
networks:
  thumalien_network:
    driver: bridge
